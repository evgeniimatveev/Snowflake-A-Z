name: Sync README

on:
  push:
    branches: [main]
    paths:
      - "practices.json"
      - "scripts/generate_readme_table.py"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Regenerate README table from practices.json
        run: python scripts/generate_readme_table.py

      - name: Commit and push if README.md changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md; then
            echo "README.md already up to date, nothing to commit."
          else
            git add README.md
            git commit -m "Auto-update practices table from practices.json [skip ci]"
            git push
          fi
